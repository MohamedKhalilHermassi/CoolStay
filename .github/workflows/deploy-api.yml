name: Deploy API to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'CoolStay.Api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore CoolStay.Api/CoolStay.Api.csproj

      - name: Build
        run: dotnet build CoolStay.Api/CoolStay.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish CoolStay.Api/CoolStay.Api.csproj --configuration Release --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
